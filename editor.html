<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <title>Editor | Fifteenth Standard</title>
  <link rel="stylesheet" href="/css/style.css">
  <script>
    let directoryHandle;

    async function selectDirectory() {
      directoryHandle = await window.showDirectoryPicker({
        id: 'draught',
        mode: 'readwrite',
      });
      loadIndex();
    };

    async function loadIndex() {
      const index = await directoryHandle.getFileHandle('index.txt', { create: true });
      const file = await index.getFile();
      const text = await file.text();
      const fileList = document.getElementById('file-list');
      fileList.innerHTML = '';
      for (const line of text.split('\n')) {
        if (line.trim() === '') continue;
        const [ path, date, status ] = line.split(',');
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = '#';
        a.textContent = path;
        a.onclick = () => openFile(path);
        li.appendChild(a);
        li.appendChild(document.createTextNode(` - ${date} - ${status}`));
        fileList.appendChild(li);
      }
    };

    async function openFile(path) {
      const fileHandle = await directoryHandle.getFileHandle(`${path}.html`);
      const file = await fileHandle.getFile();
      const text = await file.text();
      window.opener.history.pushState({}, '', `${path}`);
      window.opener.document.body.innerHTML = text;
    }
  </script>
</head>

<body>
<header>
  <nav>
    <ul>
      <li><a href="/" title="Home">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 4 4">
          <path d="M0 0 L4 0 L4 3 L3 3 L3 4 L0 4 Z" fill="currentColor" />
        </svg>
      </a></li>
      <li><a href="/blog" title="Blog">Blog</a></li>
      <li><a href="/projects" title="Projects">Projects</a></li>
      <li><a href="/plan" title="Plan">Plan</a></li>
      <li><a href="/contact" title="Contact">Contact</a></li>
    </ul>
  </nav>
</header>

<main>
<article>
<header>
  <h1>Editor</h1>
</header>
<section>
  <button onclick="selectDirectory()">Select Directory</button>
  <ul id="file-list"></ul>
</section>
</article>
</main>

</body>
</html>
